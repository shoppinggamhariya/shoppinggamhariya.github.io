<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patna Street Food Finder</title>  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f4f4f4; }
    header { background: #ff5722; color: white; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; }
    #map { height: 55vh; width: 100%; }
    .controls { padding: 10px; text-align: center; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
    input { padding:10px; width:260px; border-radius:6px; border:1px solid #ccc; }
    button { padding: 10px 15px; background: #ff5722; border: none; color: white; cursor: pointer; border-radius: 5px; }
    .restaurant-list { padding: 10px; }
    .card { background: white; margin: 10px 0; padding: 12px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    .menu { display: none; margin-top: 10px; }
  </style></head>
<body><header>Patna Street Food Finder</header><div class="controls">
  <input id="searchBox" placeholder="Search food or restaurant (e.g. momo, biryani)" />
  <button onclick="searchCustom()">🔍 Search</button>
  <button onclick="getLocation()">📍 Use My Location</button>
</div><div id="map"></div>
<div class="restaurant-list" id="restaurantList"></div><script>
let map, service, infowindow, userLocationGlobal;

// Auto load location on page load
window.onload = function(){
  getLocation();
};

function initMap(lat = 25.5941, lng = 85.1376) {
  const loc = new google.maps.LatLng(lat, lng);
  map = new google.maps.Map(document.getElementById("map"), { center: loc, zoom: 14 });
  infowindow = new google.maps.InfoWindow();
}

function getLocation() {
  if (!navigator.geolocation) {
    alert("Geolocation not supported");
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    userLocationGlobal = new google.maps.LatLng(lat, lng);
    showUserLocation(lat, lng);
    searchNearby(lat, lng);
  }, () => {
    alert("Please allow location access");
    initMap();
  });
}

function showUserLocation(lat, lng) {
  const loc = new google.maps.LatLng(lat, lng);
  map = new google.maps.Map(document.getElementById("map"), { center: loc, zoom: 15 });

  new google.maps.Marker({
    position: loc,
    map: map,
    title: "You are here",
    icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
  });

  infowindow = new google.maps.InfoWindow();
}

// Default nearby search
function searchNearby(lat, lng) {
  const request = { location: new google.maps.LatLng(lat, lng), radius: 2000, type: ['restaurant'] };
  service = new google.maps.places.PlacesService(map);
  service.nearbySearch(request, handleResults);
}

// Zomato-like search (by keyword)
function searchCustom() {
  const keyword = document.getElementById("searchBox").value;
  if (!keyword) return alert("Enter food or restaurant name");

  const request = {
    location: userLocationGlobal,
    radius: 3000,
    query: keyword
  };

  service = new google.maps.places.PlacesService(map);
  service.textSearch(request, handleResults);
}

function handleResults(results, status) {
  if (status === google.maps.places.PlacesServiceStatus.OK) {
    document.getElementById("restaurantList").innerHTML = "";
    results.forEach((place, index) => {
      createMarker(place);
      addToList(place, index);
    });
  }
}

function createMarker(place) {
  const marker = new google.maps.Marker({ map, position: place.geometry.location });
  google.maps.event.addListener(marker, 'click', () => {
    infowindow.setContent(`<b>${place.name}</b>`);
    infowindow.open(map, marker);
  });
}

// RANDOM MENU GENERATOR (NEW)
function generateRandomMenu() {
  const foods = [
    "Litti Chokha", "Momos", "Biryani", "Paneer Roll", "Chaat", "Samosa", "Dosa", "Chowmein"
  ];
  let menu = [];
  for (let i = 0; i < 3; i++) {
    const item = foods[Math.floor(Math.random() * foods.length)];
    const price = Math.floor(Math.random() * 150) + 30;
    menu.push(`${item} - ₹${price}`);
  }
  return menu;
}

function addToList(place, index) {
  const list = document.getElementById("restaurantList");
  const card = document.createElement("div");
  card.className = "card";

  const menuItems = generateRandomMenu();

  card.innerHTML = `
    <h3>${place.name}</h3>
    <p>${place.formatted_address || place.vicinity || ''}</p>
    <button onclick="toggleMenu(${index})">View Menu</button>
    <div class="menu" id="menu-${index}">
      ${menuItems.map(i => `<p>${i}</p>`).join('')}
    </div>
  `;

  list.appendChild(card);
}

function toggleMenu(index) {
  const menu = document.getElementById(`menu-${index}`);
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}
</script><!-- Replace YOUR_API_KEY --><script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&libraries=places&callback=initMap" async defer></script></body>
</html>
